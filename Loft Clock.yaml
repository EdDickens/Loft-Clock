#---------------------------------------------------------------------------------------------------
number:
  - platform: template
    name: Lux Threshold
    optimistic: true
    id: clock_display_threshold
    unit_of_measurement: "lx"
    initial_value: 1
    restore_value: true
    min_value: 0.0
    max_value: 1000
    step: 0.1
    mode: box
#--------------------------------------------
  - platform: template
    name: Temperature Offest
    optimistic: true
    id: loft_temperature_offset
    unit_of_measurement: "°F"
    initial_value: 1
    restore_value: true
    min_value: -10.0
    max_value: 10.0
    step: 0.1
    mode: box
#--------------------------------------------
  - platform: template
    name: Humdity Offest
    optimistic: true
    id: loft_humidity_offset
    unit_of_measurement: "%"
    initial_value: 1
    restore_value: true
    min_value: -10.0
    max_value: 10.0
    step: 0.1
    mode: box
#--------------------------------------------
  - platform: template
    name: Text Opacity
    optimistic: true
    id: clock_text_opacity
    unit_of_measurement: "%"
    initial_value: 100
    restore_value: true
    min_value: 1
    max_value: 100
    step: 1
    mode: box
    on_value: 
      then:
        - lvgl.label.update:
            id: 
              - header_label
              - page_prev
              - page_home
              - page_next
              - display_time
              - indoor_enviro_label
              - indoor_temp
              - indoor_humidity
              - outdoor_enviro_label
              - outdoor_temp
              - outdoor_humidity
              - pressure_enviro_label
              - home_pressure_trend
            text_opa: !lambda return id(clock_text_opacity).state / 100 * 255;
                      # Desired value needs to be scaled from a percent, then to a 0-255 range
        - lvgl.label.update:
            id: 
              - home_pressure_display
            bg_opa: !lambda return id(clock_text_opacity).state / 100 * 255;
#        - lvgl.label.update:
#            id: 
#              - display_pm25_id
#            text_opa: !lambda return (id(clock_text_opacity).state - 15) / 100 * 255;
                      # Desired value needs to be scaled from a percent, then to a 0-255 range
#--------------------------------------------------------------------------------------------------
script:
#This script returns to the main_page after XX seconds of no page flips
  - id: return_home
    then:
      - delay: 10s
      - lvgl.page.show: main_page
#----------------------------------------
  - id: show_loft_leds_brightness
    then:
      - lvgl.page.show:
          id: loft_leds_light_page
      - delay: 10s
      - lvgl.page.show:
          id: main_page
#---------------------------------------------------------------------------------------------------